name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.MACHINE_IP }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='grafana-data' \
            --exclude='loki-data' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.MACHINE_USER }}@${{ secrets.MACHINE_IP }}:/opt/chatapp/

      - name: Build and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MACHINE_IP }}
          username: ${{ secrets.MACHINE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/chatapp
            docker compose up -d --build chatapp
            docker image prune -f
            echo "Deploy complete"
            docker ps | grep chatapp
